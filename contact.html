{% extends "base.html" %}

<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} NewsToday-Contact {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    {% block content %}
    <!-- Contact Section -->
    <main class="flex-grow-1">
        <div class="container py-5">
            <h2 class="text-center mb-4">Get in Touch</h2>
            <div class="row justify-content-center">
                <!-- Contact Form -->
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-3">Send us a message</h5>
                            <form method="POST" action="/contact">
                                <div class="mb-3">
                                    <label for="id" class="form-label">Your ID</label>
                                    <input type="text" class="form-control" id="id" placeholder="Enter your ID"
                                        name="id" required>
                                </div>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Your Name</label>
                                    <input type="text" class="form-control" id="name" name="name"
                                        placeholder="Enter your name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email address</label>
                                    <input type="email" class="form-control" id="email" name="email"
                                        placeholder="Enter your email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" name="message" rows="4"
                                        placeholder="Write your message..." required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="col-md-5 mt-4 mt-md-0">
                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-3">Contact Information</h5>
                            <p class="mb-2">📍 Haldwani, Uttarakhand, India</p>
                            <p class="mb-2">📞 +91-863044xxxx</p>
                            <p class="mb-2">✉️ support@newstoday.com</p>
                            <p class="text-muted small">We aim to respond within 24 hours.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    {% endblock %}
    <!-- Footer -->

</body>

</html>
