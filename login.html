<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%  block content %}  NewsToday-Login  {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            background-color: #fff;
        }
    </style>
</head>

<body class="bg-light">
    
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Login</h2>

            <!-- Login Form -->
            <form id="loginForm" method="post">
                <div class="mb-3">
                    <label for="loginUserId" class="form-label">User ID</label>
                    <input type="text" class="form-control" id="loginUserId" placeholder="Enter User ID"
                        name="loginUserId" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter Password"
                        name="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'fail' else 'success' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
            <div class="text-center mt-3">
                <p>Don't have an account?
                    <a href="/signup" class="btn btn-success">Signup</a>
                </p>
            </div>
        </div>
    </div>

</body>

</html>
